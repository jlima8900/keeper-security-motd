#!/bin/bash
# Keeper MOTD Configuration File
# Customize your MOTD experience here

# ============================================================================
# FEATURE TOGGLES
# ============================================================================

# Enable/disable animations (vault unlocking, typing effects)
ENABLE_ANIMATIONS=true

# Enable/disable vault unlocking animation
ENABLE_VAULT=true

# Enable/disable individual modules (set to false to skip)
ENABLE_HEADER=true
ENABLE_SYSTEM_STATUS=true
ENABLE_RESOURCES=true
ENABLE_CONTAINERS=true
ENABLE_PROJECTS=true
ENABLE_SECURITY=true
ENABLE_LAPD=true
ENABLE_ACTIVITY=true
ENABLE_COMMANDS=true
ENABLE_QUOTES=true
ENABLE_SECURITY_TIP=true

# ============================================================================
# ANIMATION SETTINGS
# ============================================================================

# Animation speed (seconds between frames, lower = faster)
ANIMATION_SPEED=0.03

# Loading dot delay (seconds)
LOADING_DELAY=0.05

# Vault animation delay (seconds)
VAULT_DELAY=0.2

# ============================================================================
# DISPLAY SETTINGS
# ============================================================================

# Maximum box width (auto-adjusts to terminal width if smaller)
MAX_BOX_WIDTH=120

# Show Docker information
SHOW_DOCKER=true

# Show Keeper-specific services
SHOW_KEEPER_SERVICES=true

# Show Git information
SHOW_GIT=true

# Show project tracking info
SHOW_PROJECT_TRACKING=true

# ============================================================================
# RESOURCE THRESHOLDS (for color coding)
# ============================================================================

# RAM usage warning threshold (percentage)
RAM_WARNING=75
RAM_CRITICAL=90

# Disk usage warning threshold (percentage)
DISK_WARNING=75
DISK_CRITICAL=90

# Load average multiplier (load / cores)
LOAD_WARNING=1.5
LOAD_CRITICAL=2.0

# ============================================================================
# LAPD THREAT DETECTION SETTINGS
# ============================================================================

# Enable LAPD threat detection
ENABLE_LAPD_THREATS=true

# Threat level thresholds
THREAT_MODERATE=1
THREAT_ELEVATED=500
THREAT_CRITICAL=1000

# SSH log file location
SSH_LOG="/var/log/secure"

# Fail2ban log file location
FAIL2BAN_LOG="/var/log/fail2ban.log"

# ============================================================================
# CACHING SETTINGS
# ============================================================================

# Enable caching for expensive operations
ENABLE_CACHE=true

# Cache directory
CACHE_DIR="$HOME/.keeper_motd.d/cache"

# Cache expiration time (seconds)
# System info cache: 30 seconds
CACHE_SYSTEM_TTL=30

# Docker info cache: 15 seconds
CACHE_DOCKER_TTL=15

# Threat info cache: 60 seconds
CACHE_THREAT_TTL=60

# Git info cache: 5 seconds
CACHE_GIT_TTL=5

# ============================================================================
# CUSTOM FILES
# ============================================================================

# Security tips file
SECURITY_TIPS_FILE="$HOME/.keeper_security_tips.txt"

# Current project tracking file
CURRENT_PROJECT_FILE="$HOME/.current_automation_project"

# Automation database
AUTOMATION_DB="$HOME/.automation_context.db"

# ============================================================================
# LOGGING & DEBUGGING
# ============================================================================

# Enable debug mode (shows module loading times)
DEBUG_MODE=false

# Log file for MOTD errors
LOG_FILE="$HOME/.keeper_motd.d/motd.log"

# ============================================================================
# PERFORMANCE OPTIMIZATION
# ============================================================================

# Skip modules that take longer than this (seconds, 0 = no timeout)
MODULE_TIMEOUT=2

# Parallel module execution (experimental)
PARALLEL_EXECUTION=false
